name: PR Validation

on:
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - ".github/workflows/pr_validation.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "build.rs"
      - "rustfmt.toml"
      - ".rustfmt.toml"
      - "clippy.toml"
      - ".clippy.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"

jobs:
  compile_check:
    name: Compile check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0

      - name: Run cargo check
        run: cargo check

  test_compilation:
    name: Test target compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0

      - name: Compile tests without running them
        run: cargo test --no-run

  clippy:
    name: Clippy lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain with clippy
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: clippy

      - name: Run clippy with warnings denied
        run: cargo clippy --all-targets -- -D warnings

  integration_tests:
    name: Live Qdrant integration tests
    runs-on: ubuntu-latest
    # Live Qdrant-backed tests need repository-controlled configuration and secrets.
    # Fork and Dependabot PRs still run the external-service-free checks above, but skip this job.
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'

    services:
      qdrant:
        image: qdrant/qdrant:v1
        ports:
          - 6333:6333
          - 6334:6334
    env:
      QDRANT_CONNECTION_STRING: ${{ vars.QDRANT_CONNECTION_STRING }}
      OXIGRAPH_PATH: ./data/oxigraph
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0

      - name: Validate live integration configuration
        shell: bash
        run: |
          missing=0
          for name in QDRANT_CONNECTION_STRING OXIGRAPH_PATH OPENAI_API_KEY EMBEDDING_MODEL; do
            if [[ -z "${!name}" ]]; then
              echo "$name is required for live Qdrant-backed integration tests" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Wait for Qdrant readiness
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:6333/readyz >/dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant..."
            sleep 2
          done
          echo "Qdrant not ready in time" >&2
          curl -v http://127.0.0.1:6333/ -m 2 || true
          exit 1

      - name: Run integration tests
        run: cargo test --verbose
