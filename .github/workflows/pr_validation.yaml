name: PR Validation

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  validate_pr:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1
        ports:
          - 6333:6333
          - 6334:6334
    env:
      QDRANT_CONNECTION_STRING: ${{ vars.QDRANT_CONNECTION_STRING }}
      OXIGRAPH_CONNECTION_STRING: ${{ vars.OXIGRAPH_CONNECTION_STRING }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          components: clippy

      - name: Wait for Qdrant readiness
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:6333/readyz >/dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant..."
            sleep 2
          done
          echo "Qdrant not ready in time" >&2
          curl -v http://127.0.0.1:6333/ -m 2 || true
          exit 1

      - name: Cargo Check
        run: cargo check --all-targets

      - name: Cargo Test
        run: cargo test --verbose

      - name: Clippy Check
        run: cargo clippy --all-targets -- -D warnings
