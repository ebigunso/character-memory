name: Check Formatting

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/check_formatting.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "build.rs"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
  pull_request:
    branches: [ main, develop ]
    paths:
      - ".github/workflows/check_formatting.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "build.rs"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"

jobs:
  check_formatting:
    name: Check Rust formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with rustfmt
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: rustfmt

      - name: Run cargo fmt check
        run: cargo fmt --check
