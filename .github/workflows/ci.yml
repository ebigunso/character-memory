name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1
        ports:
          - 6333:6333

    env:
      # Consumed by Settings::load()
      QDRANT_CONNECTION_STRING: 'http://127.0.0.1:6333'
      OXIGRAPH_CONNECTION_STRING: 'http://127.0.0.1:7878'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMBEDDING_MODEL: 'text-embedding-3-small'
      CARGO_TERM_COLOR: 'always'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Qdrant readiness
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:6333/readyz >/dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant..."
            sleep 2
          done
          echo "Qdrant not ready in time" >&2
          curl -v http://127.0.0.1:6333/ -m 2 || true
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose
